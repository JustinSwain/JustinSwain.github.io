    <style>
    .concert-photo img {
      max-width: 90%;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
    }
      .album-cover { 
        max-width: 100%; 
        display: block; 
        border-radius: 8px;
    }
      .zoom {
        width: 23%;
        margin: 10px;
        position: relative;
        transition: transform 0.3s ease;
      }
      .zoom:hover {
        z-index: 100;
        transform: scale(1.5);
      }
      .zoom:hover .album-cover {
        border: 3px solid var(--space0, #00d4ff);
        box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      }
      .zoom:hover .text-box {
        display: block;
      }
      .text-box {
        display: none;
        position: absolute;
        bottom: 0px;
        left: 50%;
        transform: translateX(-50%);
        transform: translateX(-50%) scale(0.75);
        background: rgba(0, 7, 27, 0.92);
        color: white;
        padding: 10px 16px;
        border-radius: 8px;
        white-space: nowrap;
        font-size: 1.1rem;
        font-weight: 600;
        text-align: center;
        pointer-events: none;
        box-shadow: 0 8px 25px rgba(0,0,0,0.6);
      }
      .posters {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
        padding: 20px 0;
      }
      .year-section strong {
        display: block;
        font-size: 2rem;
        text-align: center;
        margin: 30px 0 15px;
        color: var(--space0, #00d4ff);
      }
      .spotify-embed {
        margin: 20px 0;
        border-radius: 12px;
        overflow: hidden;
      }

    /* BEST OF THE YEAR */
.zoom.best {
  position: relative;
  z-index: 15;
}
.zoom.best img {
  outline: 5px solid #ffd700;
  outline-offset: -3px;
  box-shadow: inset 0 0 10px rgba(255,215,0,0.5);
  box-shadow: 
    0 0 25px #ffd700,
    0 0 50px #ffea00,
    0 0 80px #ffd700;
  animation: pulse-glow 3s infinite alternate;
  pointer-events: none;
  z-index: -10;
}

/* Ribbon label */
.zoom.best::after {
  content: "★ BEST OF THE YEAR ★";
  position: absolute;
  top: -34px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(90deg, #b8860b, #ffd700, #b8860b);
  color: #000;
  font-weight: bold;
  font-size: 0.6rem;
  padding: 6px 16px;
  border-radius: 30px;
  white-space: nowrap;
  box-shadow: 0 6px 20px rgba(0,0,0,0.6);
  z-index: 20;
}

@keyframes pulse-glow {
  from { box-shadow: 0 0 5px #ffd900a8, 0 0 10px #ffea00, 0 0 18px #ffd700a8; }
  to   { box-shadow: 0 0 7px #ffd700a8, 0 0 16px #ffea00, 0 0 22px #ffd700a8; }
}

.zoom.best:hover {
  transform: scale(1.5) !important;
}

/* =========================
   DRUMMER SCRAPBOOK (ALT ROWS)
   ========================= */
.scrapbook {
  display: flex;
  flex-direction: column;
  gap: 34px;
  padding: 12px 2px 6px;
}

/* one row */
.scrap {
  /* --rot: -1.2deg; */
  display: grid;
  grid-template-columns: minmax(240px, 420px) 1fr;
  gap: 22px;
  align-items: center;

  position: relative;
  border-radius: 20px;
  padding: 18px;
  background: rgba(0, 7, 27, 0.55);
  box-shadow: 0 18px 45px rgba(0,0,0,0.55);
  overflow: hidden;

  transform: translateY(26px) rotate(var(--rot));
  opacity: 0;
  transition: transform 650ms ease, opacity 650ms ease;
  will-change: transform, opacity;
}

/* Chip links (matches <a class="chip">...) */
a.chip {
  display: inline-flex;
  align-items: center;
  text-decoration: none;
  font-weight: 650;
  font-size: 0.85rem;
  padding: 8px 10px;
  border-radius: 999px;
  background: var(--space4);
  border: 1px solid var(--space2);
}

a.chip:hover {
  transform: translateY(-1px);
  background: var(--space3);
}

.scrap-groups {
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-top: 10px;
}

.link-group-title {
  font-weight: 700;
  font-size: 0.98rem;
  color: rgba(255,255,255,0.86);
  margin-bottom: 8px;
}

.link-group-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.scrap.in {
  transform: translateY(0) rotate(var(--rot));
  opacity: 1;
}

/* alternate: image on right, text on left */
.scrap.alt {
  grid-template-columns: 1fr minmax(240px, 420px);
}

.scrap::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: 20px;
  /* box-shadow:
    inset 0 0 0 2px rgba(255,255,255,0.06),
    inset 0 0 0 12px rgba(0,0,0,0.12); */
}

.scrap-figure {
  border-radius: 18px;
  overflow: hidden;
  /* background: rgba(255,255,255,0.04); */
  padding: 10px;
}

.scrap-figure img {
  width: 100%;
  height: auto;
  display: block;
  filter: drop-shadow(0 18px 22px rgba(0,0,0,0.65));
}

/* keep your meta styles; just ensure it doesn't get squeezed weirdly */
.scrap-meta {
  padding: 6px 6px 2px;
}

/* mobile: stack image above text always */
@media (max-width: 720px) {
  .scrap,
  .scrap.alt {
    grid-template-columns: 1fr;
  }
}
    </style>

<script>
  // =========================
// DRUMMER SCRAPBOOK DATA
// =========================
const drummers = [
  {
    name: "Matt Garstka",
    img: "/images/drummers/matt_garstka.png",
    groups: [
      {
        label: "Animals as Leaders",
        links: [
          { label: "Monomyth",     url: "https://www.youtube.com/watch?v=-xUqa6pYqnY" },
          { label: "Kepler",       url: "https://www.youtube.com/watch?v=lNjOFNBkja4" },
          { label: "The Woven Web",url: "https://www.youtube.com/watch?v=7LKHkRtmHSY" },
        ],
      }, 
      {
        label: "Victoria",
        links: [
          { label: "Kepler",       url: "https://www.youtube.com/watch?v=lNjOFNBkja4" },
        ]
      },
      {
        label: "Solo",
        links: [
          { label: "35 BPM Solo",  url: "https://www.youtube.com/watch?v=mzYcGXT0v8s" },
        ]
      },
    ]
  },
  {
    name: "Matt Halpern",
    img: "/images/drummers/matt_halpern.png",
    groups: [
      {
        label: "Periphery",
        links: [
          { label: "Dracul Gras",  url: "https://www.youtube.com/watch?v=FUk72MwuWrs" },
          { label: "Wax Wings",    url: "https://www.youtube.com/watch?v=0xKmMZ79ZzM" }
        ]
      },
    ]
  },
  {
    name: "Tomas Haake",
    img: "/images/drummers/tomas_haake.png",
    groups: [
      {
        label: "Meshuggah",
        links: [
          { label: "Clockworks",   url: "https://www.youtube.com/watch?v=axGn6qeJHcM" }
        ]
      },
    ]
  },
  {
    name: "Mario Duplantier",
    img: "/images/drummers/mario_duplantier.png",
    groups: [
      {
        label: "Gojira",
        links: [
          { label: "The Art of Dying", url: "https://www.youtube.com/watch?v=R2zTNT2YPZE" }
        ]
      },
    ]
  },
  {
    name: "Danny Carey",
    img: "/images/drummers/danny_carey.png",
    groups: [
      {
        label: "Tool",
        links: [
          { label: "Pneuma (live)", url: "https://www.youtube.com/watch?v=FssULNGSZIA" },
        ]
      },
    ]
  }
];

// =========================
// RENDER
// =========================
(function renderDrummerScrapbook() {
    const container = document.getElementById("drummers-scrapbook");
    if (!container) return;

    container.innerHTML = "";

    drummers.forEach((d, i) => {
      const card = document.createElement("article");

      const isAlt = (i % 2) === 1;
      card.className = `scrap${isAlt ? " alt" : ""}`;

      const groupsHtml = (d.groups || []).map(g => {
      const chips = (g.links || []).map(l => `
        <a class="chip" href="${l.url}" target="_blank" rel="noopener noreferrer">
          ${l.label}
        </a>
      `).join("");

      return `
        <div class="link-group">
          <div class="link-group-title">${g.label}</div>
          <div class="link-group-chips">${chips}</div>
        </div>
      `;
    }).join("");

      const figureHtml = `
        <div class="scrap-figure">
          <img src="${d.img}" alt="${d.name} — ${d.band}" loading="lazy">
        </div>
      `;
      const metaHtml = `
        <div class="scrap-meta">
          <h4 class="scrap-name">${d.name}</h4>
          <div class="scrap-groups">${groupsHtml}</div>
        </div>
      `;

      card.innerHTML = isAlt ? (metaHtml + figureHtml) : (figureHtml + metaHtml);
      container.appendChild(card);
    });

    // Scroll-reveal
    const cards = Array.from(container.querySelectorAll(".scrap"));
    const io = new IntersectionObserver(
      (entries) => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add("in");
            io.unobserve(e.target);
          }
        });
      },
      { threshold: 0.2, rootMargin: "0px 0px -10% 0px" }
    );
    cards.forEach(c => io.observe(c));
})();
  // EDIT ONLY THIS OBJECT 
  const concertsByYear = {
    "2026": [
      { img: "dsoPlanets26.jpg",          caption: "DSO - Holst: The Planets"},
      { img: "badOmens26.jpg",            caption: "Bad Omens"},
      { img: "rush26.jpg",                caption: "Rush" },
      { img: "satchvai26.jpg",            caption: "SatchVai" },
    ],
    "2025": [
      { img: "meshuggah2025.webp",        caption: "Meshuggah" , best: true},
      { img: "inventAnimate25.jpg",       caption: "Invent Animate + Silent Planet" },
      { img: "rockCats.png",              caption: "Rock Cats & Acrocats" },
      { img: "ronnie25.jpg",              caption: "Falling in Reverse"},
      { img: "bilmuri25.jpg",             caption: "Bilmuri"  },
      { img: "bmth25.png",                caption: "Bring Me the Horizon" }
    ],
    "2024": [
      { img: "badOmens24.JPG",            caption: "Bad Omens" },
      { img: "knockedLoose24.jpeg",       caption: "Knocked Loose" },
      { img: "FiR2024.png",               caption: "Falling in Reverse" },
      { img: "bilmuri2024.png",           caption: "Bilmuri" , best: true},
      { img: "Animals2024.jpg",           caption: "Animals as Leaders" },
      { img: "iceNineKills24.jpg",        caption: "Ice Nine Kills" }
    ],
    "2023": [
      { img: "gojiraMastadon23.jpg",      caption: "Gojira & Mastodon" , best: true},
      { img: "dreamTheater23.webp",       caption: "Dream Theater" },
      { img: "ghost23.jpg",               caption: "Ghost" },
      { img: "avengeSevenfold23.webp",    caption: "Avenged Sevenfold" },
      { img: "dgd23.webp",                caption: "Dance Gavin Dance" },
      { img: "sleepToken23.jpg",          caption: "Sleep Token" },
      { img: "motionless23.jpg",          caption: "Motionless in White" },
      { img: "periphery23.jpg",           caption: "Periphery" }
    ],
    "2022": [
      { img: "animalsAsLeaders22.jpg",    caption: "Animals as Leaders" , best: true},
      { img: "ronnie22.jpg",              caption: "Falling in Reverse" }
    ]
  };

  const concertsContainer = document.getElementById("concerts");

  // Sort years descending and generate sections
  Object.keys(concertsByYear)
    .sort((a, b) => b - a)
    .forEach(year => {
        const section = document.createElement("div");
        section.className = "year-section";
        section.innerHTML = `<strong>${year}</strong><div class="posters"></div>`;
        const posters = section.querySelector(".posters");

        concertsByYear[year].forEach(show => {
        const zoom = document.createElement("div");
        zoom.className = "zoom";
        if (show.best) zoom.classList.add("best");   // glowing

        zoom.innerHTML = `
            <img src="/images/shows/${show.img}" class="album-cover" alt="${show.caption}" loading="lazy">
            <div class="text-box">${show.caption}</div>
        `;
    posters.appendChild(zoom);
    });

      concertsContainer.appendChild(section);
    });

  // Load components
  async function loadComponent(id, path) {
    try {
      const res = await fetch(path);
      if (!res.ok) throw new Error(res.status);
      document.getElementById(id).innerHTML = await res.text();
    } catch (e) { console.error(e); }
  }
  loadComponent("sideBarPlaceholder", "/components/sidebar.html");
  loadComponent("footerPlaceholder", "/components/footer.html");

  // Prime number easter egg
  function isPrime(n) { if (n < 2) return false; for (let i = 2; i <= Math.sqrt(n); i++) if (n % i === 0) return false; return true; }
  let n = 2;
  function updatePrime() { while (!isPrime(n)) n++; const el = document.getElementById("prime-number"); if (el) el.textContent = n; n++; }
  setInterval(updatePrime, 2000); updatePrime();
</script>
